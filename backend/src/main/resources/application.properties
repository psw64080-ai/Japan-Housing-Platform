# Japan Housing Platform - Backend Configuration

# Server
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/japan_housing
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application
app.name=Japan Housing Platform
app.version=1.0.0

# JWT Secret Key (나중에 환경변수로 변경)
jwt.secret=your-secret-key-change-in-production
jwt.expiration=86400000

# Google Cloud Translation API
google.cloud.project-id=
google.cloud.api-key=

# AWS S3
aws.s3.bucket-name=japan-housing-bucket
aws.s3.region=ap-northeast-1
